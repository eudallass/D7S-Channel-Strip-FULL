name: Build macOS ARM64 VST3

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev/all-module-params

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clean build folder
        run: rm -rf build

      - name: Configure ARM64
        run: cmake -B build -S . -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Download pluginval
        run: |
          curl -L "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip" -o pluginval.zip
          unzip pluginval.zip -d pluginval
          chmod +x pluginval/pluginval.app/Contents/MacOS/pluginval || true

      - name: Ad-hoc codesign VST3
        run: |
          codesign --force --deep --sign - "build/D7SChannelStripFull_artefacts/Release/VST3/D7S Channel Strip FULL.vst3"
          echo "✅ Codesign applied"
          codesign -dv --verbose=4 "build/D7SChannelStripFull_artefacts/Release/VST3/D7S Channel Strip FULL.vst3"
          codesign --verify --deep --strict --verbose=4 "build/D7SChannelStripFull_artefacts/Release/VST3/D7S Channel Strip FULL.vst3"

      - name: Validate VST3
        run: |
          pluginval/pluginval.app/Contents/MacOS/pluginval \
            --validate-in-process \
            --strictness-level 5 \
            "build/D7SChannelStripFull_artefacts/Release/VST3/D7S Channel Strip FULL.vst3"

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: D7S-VST3-Mac-ARM64
          path: build/**/*.vst3
